spring.application.name=run-club-api
server.port=8080
# Behind an ALB that routes /api/* to this service. With context-path=/api,
# Spring treats incoming /api/v1/foo as /v1/foo internally — controller
# mappings stay clean (`@RequestMapping("/v1/...")`) and the OpenAPI spec
# emits paths without the /api prefix. Mobile app keeps EXPO_PUBLIC_API_URL
# pointed at <host>/api.
server.servlet.context-path=/api

# Datasource - use environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/runclub}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Auth0 JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI:https://runclub.us.auth0.com/}
# Required audience the JWT must claim. Matches the Auth0 API identifier.
spring.security.oauth2.resourceserver.jwt.audiences=${AUTH0_AUDIENCE:https://api.runclub.app}

# Strava
strava.client-id=${STRAVA_CLIENT_ID}
strava.client-secret=${STRAVA_CLIENT_SECRET}
# Must match the mobile app (strava-connect) redirect exactly.
strava.redirect-uri=${STRAVA_REDIRECT_URI:runclub://localhost/strava-callback}
strava.webhook.callback-url=${STRAVA_WEBHOOK_CALLBACK_URL:}
strava.webhook.verify-token=${STRAVA_WEBHOOK_VERIFY_TOKEN:}
strava.webhook.auto-subscribe=${STRAVA_WEBHOOK_AUTO_SUBSCRIBE:false}

# Public activity share previews (Open Graph). Optional Mapbox token for og:image.
mapbox.access-token=${MAPBOX_ACCESS_TOKEN:}
# Universal Links: set RUNCLUB_APPLE_TEAM_ID for AASA JSON at /public/link-support/apple-app-site-association
runclub.apple.team-id=${RUNCLUB_APPLE_TEAM_ID:}
runclub.ios.bundle-id=${RUNCLUB_IOS_BUNDLE_ID:app.runclub}

# Token encryption (used to encrypt Strava OAuth tokens at rest).
# 32-byte (base64-encoded) key. If unset, tokens are stored as-is and a warning is logged.
runclub.token-encryption-key=${RUNCLUB_TOKEN_ENCRYPTION_KEY:}

# AWS
aws.region=${AWS_REGION:us-east-1}
s3.bucket=${S3_BUCKET}

# Logging
logging.level.root=INFO
logging.level.com.runclub=DEBUG

# Auth debug logging
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.com.runclub.api.security=DEBUG

# Auto-repair failed migrations on startup
spring.flyway.out-of-order=false

# Repair broken migration checksums on startup
spring.flyway.validate-on-migrate=false
