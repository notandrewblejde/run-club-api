spring.application.name=run-club-api
server.port=8080

# Datasource - use environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/runclub}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Auth0 JWT
spring.security.oauth2.resourceserver.jwt.issuer-uri=${AUTH0_ISSUER_URI:https://runclub.us.auth0.com/}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${AUTH0_ISSUER_URI:https://runclub.us.auth0.com/}.well-known/jwks.json

# Strava
strava.client-id=${STRAVA_CLIENT_ID}
strava.client-secret=${STRAVA_CLIENT_SECRET}
strava.redirect-uri=${STRAVA_REDIRECT_URI:http://localhost:3000/strava/callback}

# AWS
aws.region=${AWS_REGION:us-east-1}
s3.bucket=${S3_BUCKET}

# Logging
logging.level.root=INFO
logging.level.com.runclub=DEBUG
